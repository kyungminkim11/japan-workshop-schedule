r);timer=setInterval(()=>{remain--;if(remain<=0)result();tick()},1000)}else{clearInterval(timer);timer=null}show()}function startWrong(){let w=JSON.parse(localStorage.wrongV10lite||'[]');quiz=data.filter(q=>w.includes(q.id));if(!quiz.length)return alert('오답 없음');idx=0;ans=Array(quiz.length).fill(null);clearInterval(timer);timer=null;show()}function tick(){let e=$('#time');if(e)e.textContent=timer?Math.floor(remain/60)+':'+String(remain%60).padStart(2,'0'):'학습'}function show(){let q=quiz[idx];$('#qbox').innerHTML=`<b>${idx+1}/${quiz.length}</b> <span class="tag">${q.area}</span> <span class="tag hot" id="time">학습</span><div class="bar"><i style="width:${(idx+1)/quiz.length*100}%"></i></div><p class="q">${q.q}</p>${q.o.map((o,i)=>`<button class="opt" onclick="choose(${i})">${i+1}. ${o}</button>`).join('')}<div id="exp"></div><div class="tabs"><button class="btn" onclick="prev()">이전</button><button class="btn primary" onclick="next()">${idx==quiz.length-1?'결과':'다음'}</button></div>`;tick();if(ans[idx]!=null)mark()}function choose(i){ans[idx]=i;mark()}function mark(){let q=quiz[idx];document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.toggle('good',i==q.a);b.classList.toggle('bad',ans[idx]==i&&i!=q.a)});$('#exp').innerHTML=`<div class="box why"><b>정답 해설</b><br>${q.why}</div><div class="box wrong"><b>오답 포인트</b><br>${q.wrong}</div><div class="box key"><b>연결 개념</b><br>${q.link}</div>`}function prev(){if(idx>0){idx--;show()}}function next(){if(idx<quiz.length-1){idx++;show()}else result()}function result(){clearInterval(timer);let c=0,w=JSON.parse(localStorage.wrongV10lite||'[]'),by={};quiz.forEach((q,i)=>{by[q.area]=by[q.area]||[0,0];by[q.area][1]++;if(ans[i]==q.a){c++;by[q.area][0]++}else if(!w.includes(q.id))w.push(q.id)});localStorage.wrongV10lite=JSON.stringify(w);$('#qbox').innerHTML=`<h2>결과 ${c}/${quiz.length}</h2><p>${quiz.length==60?'36문항 이상이면 합격권입니다.':''}</p><table><tr><th>영역</th><th>정답</th></tr>${Object.entries(by).map(([a,v])=>`<tr><td>${a}</td><td>${v[0]}/${v[1]}</td></tr>`).join('')}</table><button class="btn primary" onclick="startWrong()">오답만 다시 풀기</button>`}render();</script></body></html>
