sel].d}</span><h2>${C[sel].t}</h2><p>${C[sel].s}</p><div class="box key"><b>핵심</b><br>${C[sel].k}</div></div></div>`}function renderQuizHome(){let v=$('#view');v.innerHTML=`<div class="two"><div class="card"><h3>CBT 설정</h3><button class="btn primary" onclick="startExam()">실전 60문항/60분</button><button class="btn" onclick="startShort()">고확률 20문항</button><button class="btn" onclick="startWrong()">오답만</button><button class="btn" onclick="localStorage.removeItem('wrongV9');alert('삭제했습니다')">오답 초기화</button></div><div class="card" id="qbox"><h3>대기</h3><p class="muted">모드를 선택하세요.</p></div></div>`}function startExam(){quiz=Q.slice(0,60);idx=0;ans=Array(quiz.length).fill(null);remain=3600;startTimer();showQ()}function startShort(){quiz=Q.slice(0,20);idx=0;ans=Array(quiz.length).fill(null);stopTimer();showQ()}function startWrong(){let w=JSON.parse(localStorage.wrongV9||'[]');quiz=Q.filter(q=>w.includes(q.id));if(!quiz.length)return alert('오답이 없습니다.');idx=0;ans=Array(quiz.length).fill(null);stopTimer();showQ()}function startTimer(){stopTimer();timer=setInterval(()=>{remain--;if(remain<=0)result();else tick()},1000)}function stopTimer(){if(timer)clearInterval(timer);timer=null}function tick(){let e=$('#time');if(e)e.textContent=String(Math.floor(remain/60)).padStart(2,'0')+':'+String(remain%60).padStart(2,'0')}function showQ(){let q=quiz[idx];let b=$('#qbox');b.innerHTML=`<b>${idx+1}/${quiz.length}</b> <span class="tag">${q.d}</span> <span class="tag hot" id="time">${timer?'60:00':'학습모드'}</span><div class="bar"><i style="width:${(idx+1)/quiz.length*100}%"></i></div><p class="q">${q.q}</p>${q.o.map((o,i)=>`<button class="opt ${ans[idx]===i?'sel':''}" onclick="choose(${i})">${i+1}. ${o}</button>`).join('')}<div id="exp" class="box key" style="display:${ans[idx]==null?'none':'block'}"></div><div class="tabs"><button class="btn" onclick="prev()" ${idx==0?'disabled':''}>이전</button><button class="btn primary" onclick="next()">${idx==quiz.length-1?'결과':'다음'}</button></div>`;tick();if(ans[idx]!=null)mark()}function choose(i){ans[idx]=i;mark()}function mark(){let q=quiz[idx];document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.toggle('good',i==q.a);b.classList.toggle('bad',ans[idx]==i&&i!=q.a)});$('#exp').style.display='block';$('#exp').innerHTML=`<b>정답 ${q.a+1}번</b><br>${q.e}`}function prev(){if(idx>0){idx--;showQ()}}function next(){if(idx<quiz.length-1){idx++;showQ()}else result()}function result(){stopTimer();let c=0,w=JSON.parse(localStorage.wrongV9||'[]'),by={};quiz.forEach((q,i)=>{by[q.d]=by[q.d]||[0,0];by[q.d][1]++;if(ans[i]==q.a){c++;by[q.d][0]++}else if(!w.includes(q.id))w.push(q.id)});localStorage.wrongV9=JSON.stringify(w);$('#qbox').innerHTML=`<h2>결과</h2><p class="q">${c}/${quiz.length} 정답</p><p>60문항 기준 36문항 이상이면 합격권입니다.</p><table class="table"><tr><th>영역</th><th>정답</th></tr>${Object.entries(by).map(([d,v])=>`<tr><td>${d}</td><td>${v[0]}/${v[1]}</td></tr>`).join('')}</table><button class="btn primary" onclick="startExam()">다시 풀기</button>`}drawTabs();render();</script></body></html>
