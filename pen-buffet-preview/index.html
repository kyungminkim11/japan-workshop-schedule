<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>블루블랙 펜뷔페 미리보기</title><style>
*{box-sizing:border-box}body{margin:0;background:#f5f6f8;color:#202a36;font-family:system-ui,-apple-system,sans-serif}button{font:inherit}.w{max-width:1180px;margin:auto;padding:0 16px}header{background:#fff;border-bottom:1px solid #dde3ea;position:sticky;top:0;z-index:5}header .w{height:66px;display:flex;align-items:center;justify-content:space-between}small{color:#42607f}.btn{border:1px solid #d6dee7;background:#fff;border-radius:12px;padding:11px 14px;font-weight:800}.navy{background:#10233f;color:#fff;border-color:#10233f}.hero{padding:42px 16px 24px}.hero h1{font-size:clamp(32px,5vw,56px);line-height:1.08;letter-spacing:-.05em;margin:8px 0 14px}.hero p{color:#667085;line-height:1.7}.notice{background:#fff5df;border:1px solid #eed39a;padding:13px;border-radius:13px;color:#75521d}.grid{display:grid;grid-template-columns:1.3fr .7fr;gap:18px}.card{background:#fff;border:1px solid #dfe5ec;border-radius:20px;box-shadow:0 16px 45px #10233f18;overflow:hidden}.view{height:560px;position:relative;background:radial-gradient(circle,#fff,#e8ebef)}#cv{position:absolute;inset:0}.hint{position:absolute;left:12px;bottom:12px;background:#ffffffdd;padding:8px 10px;border-radius:10px;font-size:12px}.tools{display:flex;gap:7px;padding:12px;flex-wrap:wrap}.tools button{flex:1}.panel{padding:16px}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:8px}.tab{min-width:135px;border:1px solid #dce3eb;background:#fff;border-radius:12px;padding:10px;text-align:left}.tab.on{border:2px solid #10233f;background:#f1f5f9}.tab i,.sum i{display:inline-block;width:14px;height:14px;border-radius:50%;border:1px solid #777;margin-right:6px}.colors{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.c{border:1px solid #dce3eb;background:#fff;border-radius:12px;padding:8px 4px;min-height:67px}.c.on{border:2px solid #10233f}.dot{display:block;width:34px;height:34px;border-radius:50%;margin:auto auto 5px;border:1px solid #888}.c b{font-size:11px}.sumBox{margin:18px auto 40px;padding:18px}.code{background:#10233f;color:#fff;padding:12px;border-radius:10px;font:800 15px monospace;word-break:break-all}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.sum{border:1px solid #e0e6ed;border-radius:12px;padding:10px}.sum small{display:block}.actions{display:flex;gap:8px;flex-wrap:wrap}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#172338;color:#fff;padding:11px 15px;border-radius:999px;display:none}.toast.on{display:block}@media(max-width:850px){.grid{grid-template-columns:1fr}.view{height:44vh;min-height:340px}.colors{grid-template-columns:repeat(3,1fr)}.summary{grid-template-columns:repeat(2,1fr)}}
</style></head><body><header><div class="w"><div><small>BlueBlack Pen Shop</small><br><b>세일러 펜뷔페 미리보기</b></div><button class="btn" id="reset">처음부터</button></div></header><main><section class="hero w"><small>매장 상담용 3D 컬러 커스터마이저</small><h1>6개 파츠를 조합해<br>나만의 만년필을 확인하세요.</h1><p>파츠와 색상을 선택하면 3D 미리보기에 즉시 반영됩니다.</p><div class="notice">화면 색상은 디스플레이 환경과 조명에 따라 실제 파츠 색상과 다르게 보일 수 있습니다. 최종 선택 전 매장에 준비된 실물 파츠를 함께 확인해 주세요.</div></section><section class="w grid"><article class="card"><div class="view"><div id="cv"></div><div class="hint">드래그 회전 · 확대/축소</div></div><div class="tools"><button class="btn" data-v="front">정면</button><button class="btn" data-v="side">측면</button><button class="btn" data-v="angle">45도</button><button class="btn" id="auto">자동 회전 끄기</button></div></article><aside class="card panel"><h2>파츠와 색상 선택</h2><p id="prog"></p><div class="tabs" id="tabs"></div><h3 id="heading"></h3><div class="colors" id="colors"></div><div class="tools"><button class="btn" id="prev">이전</button><button class="btn navy" id="next">다음</button></div></aside></section><section class="w card sumBox"><h2>현재 완성 조합</h2><div class="code" id="code"></div><div class="summary" id="summary"></div><div class="actions"><button class="btn navy" id="copy">조합 링크 복사</button><button class="btn" id="random">랜덤 조합</button><button class="btn" id="image">이미지 저장</button></div></section></main><div class="toast" id="toast"></div>
<script type="module">import*as T from'https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js';import{OrbitControls as O}from'https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/controls/OrbitControls.js';
const P=[['cap_top','캡탑'],['cap_body','캡'],['grip_section','그립 섹션'],['center_ring_or_connector','중앙 연결 파츠'],['barrel_body','배럴'],['barrel_end','배럴엔드']],C=[['black','BK','블랙','#17191d'],['white','WH','화이트','#f3f1ea'],['navy','NV','네이비','#18365d'],['blue','BL','블루','#3279bd'],['sky','SK','스카이','#8fc8df'],['pink','PK','핑크','#dfa2b5'],['red','RD','레드','#b84045'],['yellow','YL','옐로','#e7c84d'],['green','GN','그린','#4f8a70'],['clear','CL','클리어','#dcebed',1],['charcoal','CH','차콜','#4d5259'],['beige','BG','베이지','#d3bfa0'],['mint','MT','민트','#9acbbb'],['lavender','LV','라벤더','#aaa2cf'],['coral','CO','코랄','#dc8b7d'],['orange','OR','오렌지','#d88138'],['purple','PU','퍼플','#75558b'],['teal','TL','틸','#367d80'],['smoke','SM','스모크','#7c858b',1],['amber','AM','앰버','#c38c45',1]],D={cap_top:'white',cap_body:'navy',grip_section:'pink',center_ring_or_connector:'clear',barrel_body:'clear',barrel_end:'navy'};let A=0,S={...D};const col=id=>C.find(x=>x[0]==id)||C[0];try{let q=new URLSearchParams(location.search),ok=0;P.forEach(p=>{let v=q.get(p[0]);if(col(v)[0]==v)S[p[0]]=v,ok=1});if(!ok)Object.assign(S,JSON.parse(localStorage.bbpen||'null')||{})}catch{}
const scene=new T.Scene;scene.background=new T.Color(0xf0f2f5);const cam=new T.PerspectiveCamera(35,1,.1,100);cam.position.set(0,5,12);const host=document.querySelector('#cv'),r=new T.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});r.setPixelRatio(Math.min(devicePixelRatio,1.6));r.shadowMap.enabled=true;host.appendChild(r.domElement);const o=new O(cam,r.domElement);o.enableDamping=true;o.autoRotate=true;o.target.set(0,0,0);scene.add(new T.HemisphereLight(0xffffff,0x667788,2.5));let dl=new T.DirectionalLight(0xffffff,3);dl.position.set(5,7,6);dl.castShadow=true;scene.add(dl);let g=new T.Group,m={};scene.add(g);const mat=id=>{let c=col(id);return new T.MeshPhysicalMaterial({color:c[3],roughness:.22,clearcoat:.8,transparent:!!c[4],opacity:c[4]?.4:1,depthWrite:!c[4]})},metal=new T.MeshStandardMaterial({color:0xd8dde3,metalness:.9,roughness:.18});function cy(a,b,l,id,x){let z=new T.Mesh(new T.CylinderGeometry(a,b,l,42),mat(S[id]));z.rotation.z=Math.PI/2;z.position.x=x;z.castShadow=true;m[id]=z;g.add(z)}cy(.58,.63,.45,'cap_top',-3.7);cy(.72,.64,1.75,'cap_body',-2.6);cy(.52,.62,.8,'grip_section',-1.2);cy(.65,.65,.18,'center_ring_or_connector',-.7);cy(.66,.53,3.4,'barrel_body',1.1);cy(.53,.32,.55,'barrel_end',3.05);let nib=new T.Mesh(new T.ConeGeometry(.38,1.15,40),metal);nib.rotation.z=-Math.PI/2;nib.position.x=3.85;g.add(nib);[-1.7,-.7].forEach(x=>{let z=new T.Mesh(new T.TorusGeometry(.65,.05,12,40),metal);z.rotation.y=Math.PI/2;z.position.x=x;g.add(z)});let floor=new T.Mesh(new T.CircleGeometry(7,48),new T.ShadowMaterial({opacity:.18}));floor.rotation.x=-Math.PI/2;floor.position.y=-1.1;floor.receiveShadow=true;scene.add(floor);function size(){let b=host.getBoundingClientRect();r.setSize(b.width,b.height,false);cam.aspect=b.width/b.height;cam.updateProjectionMatrix()}addEventListener('resize',size);size();(function loop(){requestAnimationFrame(loop);o.update();r.render(scene,cam)})();
function code(){return'BB-SAILOR-'+P.map(p=>col(S[p[0]])[1]).join('-')}function save(){localStorage.bbpen=JSON.stringify(S);let u=new URL(location);P.forEach(p=>u.searchParams.set(p[0],S[p[0]]));history.replaceState(0,'',u)}function draw(){prog.textContent=`${A+1} / 6 파츠 선택 중`;heading.textContent=P[A][1]+' 색상';tabs.innerHTML=P.map((p,i)=>`<button class="tab ${i==A?'on':''}" data-i="${i}"><i style="background:${col(S[p[0]])[3]}"></i><b>${p[1]}</b><small>${col(S[p[0]])[2]}</small></button>`).join('');tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{A=+b.dataset.i;draw()});colors.innerHTML=C.map(c=>`<button class="c ${S[P[A][0]]==c[0]?'on':''}" data-c="${c[0]}"><span class="dot" style="background:${c[3]}"></span><b>${S[P[A][0]]==c[0]?'✓ ':''}${c[2]}</b></button>`).join('');colors.querySelectorAll('button').forEach(b=>b.onclick=()=>{S[P[A][0]]=b.dataset.c;m[P[A][0]].material.dispose();m[P[A][0]].material=mat(b.dataset.c);save();draw()});document.querySelector('#code').textContent=code();summary.innerHTML=P.map(p=>`<div class="sum"><i style="background:${col(S[p[0]])[3]}"></i><b>${p[1]}</b><small>${col(S[p[0]])[2]}</small></div>`).join('')}function msg(x){toast.textContent=x;toast.classList.add('on');setTimeout(()=>toast.classList.remove('on'),1600)}prev.onclick=()=>{A=(A+5)%6;draw()};next.onclick=()=>{A=(A+1)%6;draw()};reset.onclick=()=>{S={...D};P.forEach(p=>{m[p[0]].material.dispose();m[p[0]].material=mat(S[p[0]])});save();draw()};random.onclick=()=>{P.forEach(p=>S[p[0]]=C[Math.random()*C.length|0][0]);P.forEach(p=>{m[p[0]].material.dispose();m[p[0]].material=mat(S[p[0]])});save();draw()};copy.onclick=async()=>{try{await navigator.clipboard.writeText(location.href);msg('링크를 복사했습니다.')}catch{prompt('링크 복사',location.href)}};auto.onclick=()=>{o.autoRotate=!o.autoRotate;auto.textContent=o.autoRotate?'자동 회전 끄기':'자동 회전 켜기'};document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{let v={front:[0,5,12],side:[0,11,.1],angle:[7,5,8]}[b.dataset.v];cam.position.set(...v);o.update()});image.onclick=()=>{let a=document.createElement('a');a.download='blueblack-pen-'+code()+'.png';a.href=r.domElement.toDataURL();a.click()};save();draw();</script></body></html>
